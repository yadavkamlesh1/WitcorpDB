<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Witcorp Hub Pro v2.0 (Full Upgrade)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#f1f5f9}
.locked{background:#fff1f2!important;border-color:#f43f5e!important;color:#b91c1c!important}
.toast{position:fixed;top:20px;right:20px;background:#1e3a8a;color:#fff;padding:12px 20px;border-radius:10px;display:none}
</style>
</head>
<body class="p-6">

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginBox" class="max-w-sm bg-white p-6 rounded-xl shadow mx-auto">
<h2 class="text-xl font-bold mb-3">Secure Login</h2>
<input id="email" placeholder="Email" class="w-full p-3 border mb-2">
<input id="password" type="password" placeholder="Password" class="w-full p-3 border mb-2">
<button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">Dashboard</h1>
<button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
</div>

<!-- STATS -->
<div class="grid grid-cols-3 gap-4 mb-6">
<div class="bg-white p-4 rounded shadow"><b>Total:</b> <span id="total"></span></div>
<div class="bg-white p-4 rounded shadow"><b>Completed:</b> <span id="done"></span></div>
<div class="bg-white p-4 rounded shadow"><b>Pending:</b> <span id="pending"></span></div>
</div>

<!-- SEARCH -->
<input oninput="search(this.value)" placeholder="Search..." class="w-full p-3 border mb-4">

<!-- FORM -->
<div class="bg-white p-6 rounded-xl shadow mb-6">
<input type="hidden" id="editId">
<input id="clientName" placeholder="Client Name" class="w-full p-3 border mb-2">
<input id="service" placeholder="Service" class="w-full p-3 border mb-2">
<input id="staff" placeholder="Staff" class="w-full p-3 border mb-2">
<select id="status" class="w-full p-3 border mb-2">
<option>Pending</option>
<option>Processing</option>
<option>Completed</option>
</select>
<button onclick="save()" class="w-full bg-green-600 text-white p-3 rounded">Save</button>
</div>

<!-- TABLE -->
<table class="w-full bg-white shadow rounded">
<thead><tr class="bg-gray-100"><th class="p-3">Client</th><th>Service</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
const supabase = window.supabase.createClient(
'https://yznyimxtlamdzotfgajz.supabase.co',
'sb_publishable_XXXX'
);

let allData=[];

function toast(msg){
const t=document.getElementById('toast');
t.innerText=msg;
t.style.display='block';
setTimeout(()=>t.style.display='none',2000);
}

async function login(){
const {error}=await supabase.auth.signInWithPassword({
email:email.value,
password:password.value
});
if(error)return alert(error.message);
loginBox.classList.add('hidden');
app.classList.remove('hidden');
load();
}

async function logout(){
await supabase.auth.signOut();
location.reload();
}

async function load(){
const {data}=await supabase.from('witcorp_records').select('*');
allData=data||[];
render(allData);
updateStats();
}

function updateStats(){
total.innerText=allData.length;
done.innerText=allData.filter(r=>r.status==='Completed').length;
pending.innerText=allData.filter(r=>r.status==='Pending').length;
}

function render(data){
const tb=document.getElementById('table');
tb.innerHTML='';
data.forEach(r=>{
const tr=document.createElement('tr');
tr.innerHTML=`
<td class="p-3">${r.client_name}</td>
<td>${r.service_detail}</td>
<td>${r.status}</td>
<td>
<button onclick='edit(${JSON.stringify(r)})'>✏️</button>
<button onclick='del(${r.id})'>🗑️</button>
</td>`;
tb.appendChild(tr);
});
}

function search(q){
q=q.toLowerCase();
render(allData.filter(r=>
r.client_name?.toLowerCase().includes(q)||
r.service_detail?.toLowerCase().includes(q)||
r.assigned_staff?.toLowerCase().includes(q)||
r.status?.toLowerCase().includes(q)
));
}

async function save(){
const id=editId.value;
const payload={
client_name:clientName.value,
service_detail:service.value,
assigned_staff:staff.value,
status:status.value
};

if(!payload.client_name)return alert('Client required');

if(id){
await supabase.from('witcorp_records').update(payload).eq('id',id);
toast('Updated');
}else{
await supabase.from('witcorp_records').insert([payload]);
toast('Added');
}

clear();
load();
}

function edit(r){
editId.value=r.id;
clientName.value=r.client_name;
service.value=r.service_detail;
staff.value=r.assigned_staff;
status.value=r.status;

clientName.disabled=true;
clientName.classList.add('locked');
}

async function del(id){
if(confirm('Delete?')){
await supabase.from('witcorp_records').delete().eq('id',id);
load();
}
}

function clear(){
editId.value='';
clientName.value='';
service.value='';
staff.value='';
status.value='Pending';
clientName.disabled=false;
clientName.classList.remove('locked');
}
</script>

</body>
</html>
